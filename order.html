<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>진우네편육 | 진우네 편육</title>
    <meta name="description" content="진우네편육 메뉴, 리뷰, 가격 정보">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to bottom, #eaf4ff, #ffffff);
            font-family: 'Pretendard', sans-serif;
        }

        .main-title {
            color: #0d6efd;
            font-weight: 800;
        }

        .section-title {
            color: #0d6efd;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .custom-card {
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(13, 110, 253, 0.08);
            transition: 0.2s;
        }

        .custom-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(13, 110, 253, 0.15);
        }

        .card-body {
            padding: 5px 15px;
        }
        .card-body p {
            margin: 0;
        }

        .menu-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-info {
            display: flex;
            gap: 6px;
            align-items: center;
        }

.menu-price {
    color: #6c757d;
    font-size: 14px;
}

        .menu-name {
            font-size: 16px;
            font-weight: 500;
        }

        .quantity-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quantity-box button {
            width: 28px;
            height: 28px;
            border: none;
            background-color: #4c6fff;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }

        .total-box {
            font-size: 20px;
            font-weight: 700;
            text-align: right;
        }

        .order-main-btn {
            width: 100%;
            background-color: #4c6fff;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            margin-top: 20px;
        }

    </style>
</head>

<body>
<div class="container py-5">

    <!-- 1. 상단 -->
    <div class="text-center mb-5">
        <h2 class="main-title">진우네편육</h2>
        <p class="text-muted">쫄깃한 닭발편육과 바삭한 김부각 맛집</p>
    </div>

    <!-- 2. 주문 유의사항 -->
    <h4 class="section-title">주문 유의사항</h4>
    <div class="card custom-card mb-5">
        <div class="card-body">
            <p>• 주문은 11시부터 21시까지 가능합니다.</p>
            <p>• 택배 주문만 가능합니다.</p>
            <p>• 주문 시 조리 시작 됩니다.</p>
            <p>• 대량 주문 시 별도 문의 바랍니다.</p>
        </div>
    </div>

    <!-- 3. 메뉴 선택 -->
    <h4 class="section-title">메뉴 선택</h4>

    <div class="menu-list">
        <div class="card custom-card mb-2 menu-item" data-price="32000">
            <div class="card-body menu-row">
                <div class="menu-info">
                    <span class="menu-name">닭발 편육</span>
                    <span class="menu-price">(1kg 32,000원)</span>
                </div>
                <div class="quantity-box">
                    <button onclick="changeQty(this, -1)">-</button>
                    <span class="qty">0</span>
                    <button onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
        </div>

        <div class="card custom-card mb-2 menu-item" data-price="35000">
            <div class="card-body menu-row">
                <div class="menu-info">
                    <span class="menu-name">김부각</span>
                    <span class="menu-price">(100장 35,000원)</span>
                </div>
                <div class="quantity-box">
                    <button onclick="changeQty(this, -1)">-</button>
                    <span class="qty">0</span>
                    <button onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
        </div>
        <div class="card custom-card mb-2">
            <div class="card-body menu-row">
                <div class="menu-info">
                    <span class="menu-name">택배비</span>
                    <span class="menu-price">(기본 포함 5,000원)</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card-body total-box">
        총 금액: <span id="total-price">0</span>원
    </div>

    <!-- 4. 날짜 선택 -->
    <h4 class="section-title">배송 날짜 선택</h4>
    <div class="card custom-card mb-5">
        <div class="card-body">
            <input type="date" class="form-control" id="delivery-date">
        </div>
    </div>

    <!-- 주문 버튼 -->
    <button class="order-main-btn" onclick="sendSMS()">주문하기</button>
    <p class="text-muted small mt-2" style="text-align: center;">
    주문하기 버튼을 누르면 문자 앱이 열립니다. 내용을 확인한 뒤 직접 전송해 주세요.
    </p>

</div>

<script src="script.js"></script>
</body>
</html>
